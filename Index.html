<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuraq Connect v6</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<h1>🌙 Nuraq Connect v6</h1>


<section id="signupPage">

<h2>Create Account</h2>

<input id="signupUsername" placeholder="Username">

<input id="signupPassword" type="password" placeholder="Password">


<button onclick="createAccount()">
Create Account
</button>


<p id="signupMessage"></p>


</section>





<section id="loginPage">


<h2>Login</h2>


<input id="loginUsername" placeholder="Username">


<input id="loginPassword" type="password" placeholder="Password">


<button onclick="login()">
Login
</button>


<p id="loginMessage"></p>


</section>






<section id="homePage" style="display:none">


<h2>
Welcome <span id="userDisplay"></span> 🤲
</h2>



<button onclick="showHome()">
🏠 Home
</button>


<button onclick="showProfile()">
👤 Profile
</button>


<button onclick="showSearch()">
🔍 Search
</button>


<button onclick="showMembers()">
👥 Members
</button>


<button onclick="showGroups()">
👨‍👩‍👦 Groups
</button>


<button onclick="showMessages()">
💬 Chat
</button>


<button onclick="showVoice()">
🎤 Voice Recorder
</button>


<button onclick="showPosts()">
📷 Posts
</button>


<button onclick="showNotifications()">
🔔 Notifications
</button>


<button onclick="showSettings()">
⚙️ Settings
</button>



<div id="content">

</div>



</section>



</div>


<script src="script.js"></script>


</body>


</html>
